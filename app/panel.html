<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JT Markets — Panel</title>
  <style>
    :root { --bg:#0e1116; --card:#161b22; --line:#222a35; --txt:#e6edf3; --mut:#8b949e;
            --green:#2ea043; --blue:#388bfd; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    .hidden { display:none !important; }
    /* Login */
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:32px 28px; width:100%; max-width:360px; }
    .login-card img { height:34px; display:block; margin:0 auto 22px; }
    .login-card h1 { font-size:16px; font-weight:600; text-align:center; margin:0 0 20px; color:var(--mut); }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12px; color:var(--mut); margin-bottom:5px; }
    .field input { width:100%; padding:10px 12px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--txt); font-size:14px; outline:none; }
    .field input:focus { border-color:var(--blue); }
    .btn { width:100%; padding:11px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
    .btn:hover { background:#2f7ae0; } .btn:disabled { opacity:.6; cursor:default; }
    .msg { font-size:13px; margin-top:12px; text-align:center; min-height:18px; }
    .msg.err { color:#f85149; }
    /* Header */
    header { padding:16px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
    header img { height:30px; }
    .who { display:flex; align-items:center; gap:12px; font-size:14px; }
    .badge { font-size:11px; padding:2px 9px; border-radius:20px; background:#21262d; color:var(--mut); }
    .logout { background:none; border:1px solid var(--line); color:var(--mut); padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
    .logout:hover { color:var(--txt); border-color:var(--mut); }
    /* Pipeline */
    .wrap { padding:28px 24px; max-width:1040px; margin:0 auto; }
    .pipe-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .pipe-head h2 { margin:0; font-size:15px; }
    .btn-add { background:var(--blue); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-add:hover { background:#2f7ae0; }
    .add-form { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px;
                display:grid; grid-template-columns:repeat(2,1fr); gap:13px; }
    .add-form .full { grid-column:1 / -1; }
    .add-form label { display:block; font-size:11px; color:var(--mut); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .add-form input, .add-form select { width:100%; padding:9px 11px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--txt); font-size:14px; outline:none; }
    .add-form input:focus, .add-form select:focus { border-color:var(--blue); }
    table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; font-size:13px; }
    th { text-align:left; padding:10px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--mut); border-bottom:1px solid var(--line); }
    td { padding:10px 12px; border-bottom:1px solid var(--line); }
    tr:last-child td { border-bottom:none; }
    .num { text-align:right; font-variant-numeric:tabular-nums; }
    .pill { font-size:11px; padding:2px 9px; border-radius:20px; white-space:nowrap; }
    .b-red{background:#3a1d1d;color:#f87171}.b-orange{background:#3a2a14;color:#fb923c}.b-green{background:#16301f;color:#4ade80}
    .b-blue{background:#15233a;color:#60a5fa}.b-yellow{background:#332b10;color:#facc15}.b-gray{background:#262b33;color:#9ca3af}
    .state { color:var(--mut); font-size:13px; padding:16px; }
    tbody tr { cursor:pointer; } tbody tr:hover td { background:#1b2230; }
    /* Edit modal */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .modal-card { background:var(--card); border:1px solid var(--line); border-radius:14px; width:100%; max-width:520px; }
    .modal-head { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--line); }
    .modal-head strong { font-size:15px; }
    .modal-head .x { background:none; border:none; color:var(--mut); font-size:16px; cursor:pointer; }
    .mform { padding:18px 20px; display:grid; grid-template-columns:repeat(2,1fr); gap:13px; }
    .mform .full { grid-column:1 / -1; }
    .mform label { display:block; font-size:11px; color:var(--mut); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .mform input, .mform select { width:100%; padding:9px 11px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--txt); font-size:14px; outline:none; }
    .mform input:focus, .mform select:focus { border-color:var(--blue); }
    .sig-head { font-size:11px; color:var(--blue); text-transform:uppercase; letter-spacing:.4px; border-top:1px solid var(--line); padding-top:13px; margin-top:2px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login" class="login-wrap">
    <form class="login-card" id="login-form">
      <img src="logo.png" alt="JT Markets" />
      <h1>Panel de agentes</h1>
      <div class="field"><label>Email</label><input type="email" id="email" autocomplete="username" required /></div>
      <div class="field"><label>Contraseña</label><input type="password" id="password" autocomplete="current-password" required /></div>
      <button class="btn" type="submit" id="login-btn">Entrar</button>
      <div class="msg" id="login-msg"></div>
    </form>
  </div>

  <!-- PANEL -->
  <div id="panel" class="hidden">
    <header>
      <img src="logo.png" alt="JT Markets" />
      <div class="who">
        <span id="who-name"></span>
        <span class="badge" id="who-role"></span>
        <button class="logout" id="logout">Salir</button>
      </div>
    </header>
    <div class="wrap">
      <!-- Admin tabs (only gm/admin) -->
      <div id="admin-tabs" class="hidden" style="display:flex;gap:6px;margin-bottom:20px">
        <button class="period-btn active" id="tab-mine" type="button">Mi panel</button>
        <button class="period-btn" id="tab-team" type="button">Equipo</button>
      </div>
      <style>
        .period-btn { padding:6px 16px; border:1px solid var(--line); background:var(--card); border-radius:20px; font-size:13px; color:var(--mut); cursor:pointer; }
        .period-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
      </style>

      <div id="view-team" class="hidden">
        <div style="display:flex;align-items:center;gap:10px">
          <h2 style="font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:0">Reportes</h2>
          <button class="period-btn" id="day-prev" type="button">◀</button>
          <strong id="day-label" style="font-size:13px;min-width:90px;text-align:center"></strong>
          <button class="period-btn" id="day-next" type="button">▶</button>
        </div>
        <div id="team-reports" class="state">Cargando…</div>
        <h2 style="font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-top:26px">Pipeline del equipo</h2>
        <div id="team-pipeline" class="state">Cargando…</div>
      </div>

      <div id="view-mine">
      <!-- Daily report card -->
      <div id="dr-card" style="border-radius:12px;border:1px solid var(--line);background:var(--card);padding:16px 18px;margin-bottom:22px">
        <div id="dr-status" class="state" style="padding:0">Cargando…</div>
        <form id="dr-form" class="hidden" style="margin-top:14px">
          <label style="display:block;font-size:11px;color:var(--mut);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Actividad de hoy (se llena sola con tus notas y señales)</label>
          <textarea id="dr-summary" rows="7" style="width:100%;padding:10px 12px;background:#0e1116;border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:13px;outline:none;resize:vertical;font-family:inherit;line-height:1.5"></textarea>
          <label style="display:block;font-size:11px;color:var(--mut);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.4px">Notas adicionales</label>
          <textarea id="dr-commit" rows="2" placeholder="Algo más que reportar, compromisos para mañana…" style="width:100%;padding:10px 12px;background:#0e1116;border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:13px;outline:none;resize:vertical;font-family:inherit"></textarea>
          <div style="margin-top:12px"><button class="btn-add" type="submit" id="dr-send">Enviar reporte de hoy</button>
            <span class="msg err" id="dr-msg" style="margin-left:10px"></span></div>
        </form>
      </div>

      <div class="pipe-head">
        <h2>Mi Pipeline</h2>
        <button class="btn-add" id="add-toggle">+ Agregar prospecto</button>
      </div>
      <form class="add-form hidden" id="add-form">
        <div class="full"><label>Prospecto</label><input id="f-name" required /></div>
        <div><label>País</label><input id="f-country" /></div>
        <div><label>Fuente</label><select id="f-source">
          <option>IB Direct</option><option>IB Referral</option><option>Meta Funnel</option><option>Direct</option>
        </select></div>
        <div><label>Status</label><select id="f-status"></select></div>
        <div><label>Deal size (USD)</label><input id="f-deal" type="number" step="0.01" placeholder="0" /></div>
        <div><label>Próximo paso</label><input id="f-next" placeholder="Ej: Llamar el lunes" /></div>
        <div><label>Fecha próximo paso</label><input id="f-date" type="date" /></div>
        <div class="full"><button class="btn-add" type="submit" id="save-btn">Guardar prospecto</button>
          <span class="msg err" id="add-msg" style="margin-left:10px"></span></div>
      </form>
      <div id="pipeline"><div class="state">Cargando…</div></div>
      </div><!-- /view-mine -->
    </div>

    <!-- Edit modal -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head"><strong id="edit-title">Editar prospecto</strong><button class="x" id="edit-close">✕</button></div>
        <div class="mform">
          <div><label>Status</label><select id="e-status"></select></div>
          <div><label>Deal size (USD)</label><input id="e-deal" type="number" step="0.01" /></div>
          <div><label>Próximo paso</label><input id="e-next" /></div>
          <div><label>Fecha próximo paso</label><input id="e-date" type="date" /></div>
          <div class="full sig-head">Señal de depósito (opcional)</div>
          <div><label>Monto</label><input id="e-sig-amt" type="number" step="0.01" /></div>
          <div><label>Fecha esperada</label><input id="e-sig-date" type="date" /></div>
          <div class="full"><label>Tipo</label><select id="e-sig-type">
            <option value="">—</option><option value="new_ftd">Nuevo depósito (FTD)</option><option value="redeposit">Re-depósito</option>
          </select></div>
          <div class="full"><button class="btn-add" id="edit-save">Guardar cambios</button>
            <span class="msg err" id="edit-msg" style="margin-left:10px"></span></div>
          <div class="full sig-head">Historial / Notas</div>
          <div class="full">
            <textarea id="n-text" rows="2" placeholder="Escribe el avance de hoy…"
              style="width:100%;padding:9px 11px;background:#0e1116;border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:14px;outline:none;resize:vertical;font-family:inherit"></textarea>
            <button class="btn-add" id="n-add" style="margin-top:8px">Agregar nota</button>
            <span class="msg err" id="n-msg" style="margin-left:10px"></span>
          </div>
          <div class="full" id="n-list" style="max-height:220px;overflow:auto"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="panel.js"></script>
</body>
</html>
